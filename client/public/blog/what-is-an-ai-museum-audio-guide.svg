<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AI Museum Audio Guide">
  <defs>
    <!-- Lime radial glow — matches ai_audio_guides ArticlePlaceholder -->
    <radialGradient id="lime-glow" cx="30%" cy="40%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C8DF52" stop-opacity="0.15"/>
      <stop offset="65%"  stop-color="#C8DF52" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C8DF52" stop-opacity="0"/>
    </radialGradient>
    <!-- Warm yellow secondary glow (right balance) -->
    <radialGradient id="warm-glow" cx="73%" cy="63%" r="48%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFBF5E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFBF5E" stop-opacity="0"/>
    </radialGradient>
    <!-- Dot grid — matches ArticlePlaceholder (24px, 1px dots, low opacity) -->
    <pattern id="dot-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="white" opacity="0.028"/>
    </pattern>
    <!-- Glow filter for central icon -->
    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Base background ── -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- ── Gradient overlays ── -->
  <rect width="1200" height="630" fill="url(#lime-glow)"/>
  <rect width="1200" height="630" fill="url(#warm-glow)"/>

  <!-- ── Dot grid ── -->
  <rect width="1200" height="630" fill="url(#dot-grid)"/>

  <!-- ── Concentric rings (matches ArticlePlaceholder geometry) ── -->
  <!-- Outer ring — white/5 -->
  <circle cx="600" cy="315" r="248" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Mid ring — lime/10 -->
  <circle cx="600" cy="315" r="170" fill="none" stroke="#C8DF52" stroke-opacity="0.09" stroke-width="1"/>
  <!-- Inner ring — yellow/12 -->
  <circle cx="600" cy="315" r="100" fill="none" stroke="#FFBF5E" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ── Central icon group (Lucide Bot, 24×24 → 90×90 at 3.75×) ──
       Centered at (600, 315): translate(600 - 45, 315 - 45) = (555, 270)
       scale(3.75) -->
  <g transform="translate(555, 270) scale(3.75)"
     fill="none"
     stroke="#FFBF5E"
     stroke-opacity="0.22"
     stroke-width="1.5"
     stroke-linecap="round"
     stroke-linejoin="round"
     filter="url(#icon-glow)">
    <!-- Bot body rectangle: x=3 y=11 w=18 h=10 rx=2 -->
    <rect x="3" y="11" width="18" height="10" rx="2"/>
    <!-- Bot head circle -->
    <circle cx="12" cy="5" r="2"/>
    <!-- Neck connector -->
    <path d="M12 7v4"/>
    <!-- Eyes (dots via round linecap on zero-length line) -->
    <line x1="8"  x2="8"  y1="16" y2="16" stroke-width="2.5"/>
    <line x1="16" x2="16" y1="16" y2="16" stroke-width="2.5"/>
    <!-- Ear receivers -->
    <line x1="3"  y1="13.5" x2="0.5" y2="13.5"/>
    <line x1="21" y1="13.5" x2="23.5" y2="13.5"/>
  </g>

  <!-- ── Audio waveform bars (centered below icon, ~y=390) ──
       Bars symmetric around x=600, heights vary for natural waveform feel -->
  <g opacity="1">
    <!-- Centre pair — yellow, tallest -->
    <rect x="596" y="393" width="5" height="30" rx="2.5" fill="#FFBF5E" opacity="0.38"/>
    <rect x="607" y="398" width="5" height="20" rx="2.5" fill="#FFBF5E" opacity="0.32"/>
    <!-- Inner pair -->
    <rect x="585" y="396" width="5" height="24" rx="2.5" fill="#FFBF5E" opacity="0.28"/>
    <rect x="618" y="396" width="5" height="24" rx="2.5" fill="#FFBF5E" opacity="0.28"/>
    <!-- Mid pair — lime -->
    <rect x="574" y="400" width="5" height="16" rx="2.5" fill="#C8DF52" opacity="0.30"/>
    <rect x="629" y="400" width="5" height="16" rx="2.5" fill="#C8DF52" opacity="0.30"/>
    <!-- Outer pair — lime, shorter -->
    <rect x="563" y="403" width="5" height="10" rx="2.5" fill="#C8DF52" opacity="0.20"/>
    <rect x="640" y="403" width="5" height="10" rx="2.5" fill="#C8DF52" opacity="0.20"/>
    <!-- Far outer pair — lime, faintest -->
    <rect x="552" y="405" width="5" height="6"  rx="2.5" fill="#C8DF52" opacity="0.12"/>
    <rect x="651" y="405" width="5" height="6"  rx="2.5" fill="#C8DF52" opacity="0.12"/>
  </g>

  <!-- ── Conversation arc — dashed lines suggesting dialogue ── -->
  <!-- Arc emanating right (outgoing) -->
  <path d="M 660 290 Q 720 268 745 300 Q 768 332 728 350"
        fill="none" stroke="#FFBF5E" stroke-opacity="0.13" stroke-width="1.2"
        stroke-dasharray="5 5" stroke-linecap="round"/>
  <path d="M 672 276 Q 748 249 776 290 Q 804 331 752 354"
        fill="none" stroke="#FFBF5E" stroke-opacity="0.07" stroke-width="1"
        stroke-dasharray="5 5" stroke-linecap="round"/>
  <!-- Arc emanating left (incoming) -->
  <path d="M 540 290 Q 480 268 455 300 Q 432 332 472 350"
        fill="none" stroke="#C8DF52" stroke-opacity="0.10" stroke-width="1.2"
        stroke-dasharray="5 5" stroke-linecap="round"/>
  <path d="M 528 276 Q 452 249 424 290 Q 396 331 448 354"
        fill="none" stroke="#C8DF52" stroke-opacity="0.06" stroke-width="1"
        stroke-dasharray="5 5" stroke-linecap="round"/>

  <!-- ── Tag pill — bottom-left, matches TagPill component style ── -->
  <rect x="44" y="570" width="170" height="28" rx="14"
        fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="129" y="588"
        font-family="Raleway, system-ui, -apple-system, sans-serif"
        font-size="10" font-weight="700" fill="white" fill-opacity="0.35"
        text-anchor="middle" letter-spacing="2.5">AI AUDIO GUIDES</text>

  <!-- ── Minimal brand wordmark — top-right, ghost weight ── -->
  <text x="1156" y="50"
        font-family="Raleway, system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="700" fill="white" fill-opacity="0.13"
        text-anchor="end" letter-spacing="3.5">TREE'D</text>
</svg>
